name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: [self-hosted, arc-runner-unityinflow]
            artifact: injection-scanner-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: [self-hosted, orangepi]
            artifact: injection-scanner-linux-aarch64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: injection-scanner-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: injection-scanner-darwin-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/injection-scanner ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            injection-scanner-linux-x86_64/injection-scanner-linux-x86_64
            injection-scanner-linux-aarch64/injection-scanner-linux-aarch64
            injection-scanner-darwin-arm64/injection-scanner-darwin-arm64
            injection-scanner-darwin-x86_64/injection-scanner-darwin-x86_64
